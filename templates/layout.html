<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: #e8e8e8;
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  #header {
    padding: 14px 20px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #555;
    letter-spacing: 0.08em;
  }

  #status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s;
  }
  #status-dot.connected { background: #3ddc84; }
  #status-dot.error     { background: #ff4d4d; }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .msg {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user  { align-self: flex-end; background: #1a1a2e; border: 1px solid #2a2a4a; color: #a0a8ff; }
  .msg.agent { align-self: flex-start; background: #111; border: 1px solid #222; color: #e8e8e8; }
  .msg.sys   { align-self: center; color: #444; font-size: 11px; font-style: italic; }

  #composer {
    border-top: 1px solid #222;
    padding: 14px 20px;
    display: flex;
    gap: 10px;
  }

  #input {
    flex: 1;
    background: #111;
    border: 1px solid #282828;
    border-radius: 4px;
    color: #e8e8e8;
    font-family: inherit;
    font-size: 13px;
    padding: 10px 14px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    height: 42px;
    line-height: 1.4;
  }
  #input:focus { border-color: #3d3d6b; }

  #send {
    background: #1a1a2e;
    border: 1px solid #3d3d6b;
    border-radius: 4px;
    color: #a0a8ff;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 0 18px;
    transition: background 0.2s, color 0.2s;
  }
  #send:hover:not(:disabled) { background: #2a2a4a; color: #c8ccff; }
  #send:disabled { opacity: 0.3; cursor: default; }
</style>
</head>
<body>

<div id="header">
  <div id="status-dot"></div>
  <span id="status-text">łączenie...</span>
</div>

<div id="log"></div>

<div id="composer">
  <textarea id="input" placeholder="Napisz wiadomość..." disabled></textarea>
  <button id="send" disabled>wyślij</button>
</div>

<script>
  const log      = document.getElementById('log');
  const input    = document.getElementById('input');
  const sendBtn  = document.getElementById('send');
  const dot      = document.getElementById('status-dot');
  const statusTx = document.getElementById('status-text');

  let ws = null;
  let currentAgentMsg = null;

  function addMsg(text, type) {
    const el = document.createElement('div');
    el.className = 'msg ' + type;
    el.textContent = text;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    return el;
  }

  function setStatus(state, label) {
    dot.className = 'status-dot' + (state ? ' ' + state : '');
    statusTx.textContent = label;
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/api/v1/ws/agent`);

    ws.onopen = () => {
      setStatus('connected', 'połączono');
      input.disabled = false;
      sendBtn.disabled = false;
      addMsg('Połączono z agentem.', 'sys');
    };

    ws.onmessage = (e) => {
      if (e.data === '[DONE]') {
        currentAgentMsg = null;
        return;
      }
      if (!currentAgentMsg) {
        currentAgentMsg = addMsg('', 'agent');
      }
      currentAgentMsg.textContent += e.data;
      log.scrollTop = log.scrollHeight;
    };

    ws.onclose = () => {
      setStatus('error', 'rozłączono — odświeź stronę');
      input.disabled = true;
      sendBtn.disabled = true;
      addMsg('Połączenie zakończone.', 'sys');
    };

    ws.onerror = () => {
      setStatus('error', 'błąd połączenia');
    };
  }

  function send() {
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    currentAgentMsg = null;
    addMsg(text, 'user');
    ws.send(text);
    input.value = '';
    input.style.height = '42px';
  }

  sendBtn.onclick = send;

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  input.addEventListener('input', () => {
    input.style.height = '42px';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  connect();
</script>
</body>
</html>
